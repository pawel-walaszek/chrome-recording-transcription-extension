<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Meet2Note Connection</title>
  <style>
    body {
      align-items: center;
      background: #f5f5f5;
      color: #1f1f1f;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
    }
    main {
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      max-width: 420px;
      padding: 24px;
      width: calc(100% - 48px);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }
    p {
      color: #595959;
      font-size: 14px;
      line-height: 1.45;
      margin: 0;
    }
    body[data-state="success"] h1 {
      color: #237804;
    }
    body[data-state="error"] h1 {
      color: #a8071a;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="status">Connecting to Meet2Note...</h1>
    <p id="detail">Finishing extension connection.</p>
  </main>
  <script src="connectCallback.js"></script>
</body>
</html>
