name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on:
      - self-hosted
      - meet2note
      - production
      - extension-build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate
        run: make check

      - name: Cleanup build environment
        if: always()
        run: make deps-clean || true
