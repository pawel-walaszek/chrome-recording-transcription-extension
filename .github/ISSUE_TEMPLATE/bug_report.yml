name: Bug report
description: Report a reproducible problem with the extension.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the page type, extension action, and whether captions or recording were involved.
      placeholder: |
        1. Run make build
        2. Load dist/ in chrome://extensions
        3. Open a Google Meet...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Transcript download
        - Recording
        - Microphone permission
        - Extension build/load
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Chrome/Chromium version, OS, Node.js version if build-related.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Include relevant console errors from the Meet tab, popup, service worker, or offscreen document. Do not attach private recordings or transcripts.
      render: text
